# Throwaway check — confirms each required secret is present without ever printing its value.
# Delete/archive once Phase 0 (steps 0.5-0.8) all pass — see PROJECT_PLAN.md step 0.9.
name: test-secrets

on:
  workflow_dispatch: {}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Report secret presence
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          check() {
            if [ -n "${!1}" ]; then
              echo "$1: true"
            else
              echo "$1: false"
            fi
          }
          check R2_ACCESS_KEY
          check R2_SECRET_KEY
          check R2_ENDPOINT
          check R2_BUCKET
          check DATABRICKS_HOST
          check DATABRICKS_TOKEN
          check FRED_API_KEY

  test-connections:
    runs-on: ubuntu-latest
    needs: check-secrets
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Test Databricks connection (steps 0.6-0.7)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python scripts/test_databricks_connection.py
      - name: Test R2 connection (step 0.8)
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python scripts/test_r2_connection.py
