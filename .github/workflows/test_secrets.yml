# Throwaway check — confirms each required secret is present without ever printing its value.
# Delete/archive once Phase 0 (steps 0.5-0.8) all pass — see PROJECT_PLAN.md step 0.9.
name: test-secrets

on:
  workflow_dispatch: {}

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Report secret presence
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          check() {
            if [ -n "${!1}" ]; then
              echo "$1: true"
            else
              echo "$1: false"
            fi
          }
          check R2_ACCESS_KEY
          check R2_SECRET_KEY
          check R2_ENDPOINT
          check R2_BUCKET
          check DATABRICKS_HOST
          check DATABRICKS_TOKEN
          check FRED_API_KEY
