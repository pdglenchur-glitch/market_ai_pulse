# Single daily cron: ingest -> trigger transform -> export -> publish
# Was weekly ("0 6 * * 1", Mondays) through Phase 5; switched to daily once the
# rate-limit review found no external API blocker. If Databricks Free Edition
# compute quota becomes an issue, revert to the line above — that's the only
# change needed to roll back.
name: pipeline

on:
  workflow_dispatch: {}
  schedule:
    # Daily 06:00 UTC
    - cron: "0 6 * * *"

permissions:
  contents: write
  issues: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Run ingestion (all sources -> R2 + Databricks volume)
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python run_ingestion.py
        working-directory: ingestion
      - name: Trigger Lakeflow transform job and wait for it to finish
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python trigger_and_poll_job.py
        working-directory: orchestration
      - name: Export gold tables to docs/data/*.json
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python export_gold_to_json.py
        working-directory: orchestration
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Update dashboard data"
          git push
      - name: Open or update a failure alert issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label pipeline-failure --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Pipeline failed again: $RUN_URL"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" \
              --title "Pipeline failure: $(date -u +%Y-%m-%d)" \
              --label pipeline-failure \
              --body "The daily pipeline failed and the dashboard may now be stale. See the run: $RUN_URL"
          fi
      - name: Close any open failure alert now that the pipeline recovered
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --repo "$GITHUB_REPOSITORY" --label pipeline-failure --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$GITHUB_REPOSITORY" --body "Pipeline succeeded on the next run — closing."
            gh issue close "$existing" --repo "$GITHUB_REPOSITORY"
          fi
