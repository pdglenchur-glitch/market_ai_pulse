# Single weekly cron: ingest -> trigger transform -> export -> publish
# (export/publish steps added in Phase 4; this currently covers ingest + transform)
name: pipeline

on:
  workflow_dispatch: {}
  schedule:
    # Mondays 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Run ingestion (all sources -> R2 + Databricks volume)
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python run_ingestion.py
        working-directory: ingestion
      - name: Trigger Lakeflow transform job and wait for it to finish
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: python trigger_and_poll_job.py
        working-directory: orchestration
