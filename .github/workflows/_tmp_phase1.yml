# Temporary scratch workflow for manually verifying Phase 1 steps one at a time.
# Removed once the full Phase 1 chain (steps 1.1-1.8) is proven end to end.
name: tmp-phase1

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - name: Pull market data
        run: python ingestion/pull_market_data.py
      - name: Land to R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: python ingestion/land_to_r2.py
